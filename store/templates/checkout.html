<!DOCTYPE html>
<html>
<head>
<title>Checkout</title>

<style>

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(120deg,#ff9a9e,#fad0c4);
    margin:0;
}



.navbar{
    background:#ff4b5c;
    padding:15px 40px;
    color:white;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.navbar a{
    color:white;
    text-decoration:none;
    font-weight:bold;
}



.checkout-container{
    width:420px;
    margin:60px auto;
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 8px 25px rgba(0,0,0,0.2);
}

.checkout-container h2{
    text-align:center;
    color:#ff4b5c;
    margin-bottom:20px;
}



.checkout-form label{
    display:block;
    margin-top:12px;
    font-weight:bold;
}

.checkout-form input,
.checkout-form textarea{
    width:100%;
    padding:10px;
    margin-top:6px;
    border:1px solid #ddd;
    border-radius:6px;
}

.checkout-form input:focus,
.checkout-form textarea:focus{
    border-color:#ff4b5c;
    outline:none;
}


.checkout-form button{
    width:100%;
    margin-top:20px;
    padding:12px;
    border:none;
    border-radius:6px;
    background:linear-gradient(90deg,#ff4b5c,#ff7a18);
    color:white;
    font-size:16px;
    cursor:pointer;
}

.checkout-form button:hover{
    transform:scale(1.05);
}

</style>
</head>

<body>

<div class="navbar">
    <div>🛍 Fresh Mart</div>
    <a href="/">Back to Home</a>
</div>

<div class="checkout-container">

<h2>Checkout</h2>

<form class="checkout-form">

<label>Full Name</label>
<input type="text" placeholder="Enter your name" required>

<label>Phone Number</label>
<input type="text" placeholder="Enter phone number" required>

<label>Address</label>
<textarea rows="3" placeholder="Enter delivery address" required></textarea>

<label>City</label>
<input type="text" placeholder="Enter city" required>

<label>Pincode</label>
<input type="text" placeholder="Enter pincode" required>

<button type="submit">Place Order</button>

</form>

</div>

</body>
</html>
