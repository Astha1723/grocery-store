<!DOCTYPE html>
<html>
<head>
    <title>Sign Up - FreshMart</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body{
            margin:0;
            font-family:'Segoe UI', sans-serif;
            background: linear-gradient(135deg,#1b5e20,#43a047);
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(12px);
            padding:50px;
            border-radius:20px;
            width:350px;
            box-shadow:0 25px 50px rgba(0,0,0,0.2);
            text-align:center;
            color:white;
        }

        .container h2{
            margin-bottom:30px;
            font-size:28px;
        }

        .input-box{
            margin-bottom:20px;
            text-align:left;
        }

        .input-box label{
            font-size:14px;
        }

        .input-box input{
            width:100%;
            padding:10px;
            margin-top:5px;
            border:none;
            border-radius:8px;
            outline:none;
        }

        .btn{
            width:100%;
            padding:12px;
            border:none;
            border-radius:25px;
            background:white;
            color:#1b5e20;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
        }

        .btn:hover{
            background:#f1f1f1;
        }

        .link{
            margin-top:20px;
            font-size:14px;
        }

        .link a{
            color:white;
            text-decoration:underline;
        }

        .logo{
            font-size:24px;
            margin-bottom:10px;
        }

    </style>
</head>

<body>

<div class="container">
    <div class="logo">🛒 FreshMart</div>
    <h2>Create Account</h2>

    <form method="POST">
        {% csrf_token %}

        <div class="input-box">
            <label>Username</label>
            <input type="text" name="username" required>
        </div>

        <div class="input-box">
            <label>Password</label>
            <input type="password" name="password" required>
        </div>

        <button type="submit" class="btn">Sign Up</button>
    </form>

    <div class="link">
        Already have an account?
        <a href="{% url 'login' %}">Login</a>
    </div>
</div>

</body>
</html>
